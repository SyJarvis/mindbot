# MindBot Configuration
# 支持多账号、多模型的动态路由系统

agent:
  model: "ollama/0/qwen3"  # 格式: provider/endpoint/model
  temperature: 0.7
  max_tokens: 8192
  max_tool_iterations: 20

# Provider 配置 - 支持多 endpoint（多账号）
providers:
  # Ollama 本地模型
  ollama:
    strategy: "round-robin"  # round-robin | random | priority
    endpoints:
      - base_url: "http://localhost:11434"
        api_key: ""
        weight: 1
        models:
          - id: "qwen3"
            role: "chat"
            level: "medium"
            vision: false

  # Moon/Kimi API 示例（多账号负载均衡）
  # openai:
  #   strategy: "round-robin"
  #   endpoints:
  #     - base_url: "https://api.moonshot.cn/v1"
  #       api_key: "sk-your-key-1"
  #       weight: 2  # 更高权重 = 更多请求
  #       models:
  #         - id: "kimi-k2.5"
  #           role: "chat"
  #           level: "high"
  #           vision: true
  #     - base_url: "https://api.moonshot.cn/v1"
  #       api_key: "sk-your-key-2"  # 备用账号
  #       weight: 1
  #       models:
  #         - id: "kimi-k2.5"
  #           role: "chat"
  #           level: "high"
  #           vision: true

# 动态路由配置
routing:
  auto: true  # 启用自动路由
  rules:
    # 代码相关任务使用高等级模型
    - keywords: ["代码", "code", "编程", "函数", "算法"]
      level: "high"
      priority: 10
    # 简单对话使用低等级模型
    - keywords: ["你好", "简单", "快"]
      level: "low"
      priority: 5

# 记忆配置
memory:
  storage_path: "~/.mindbot/data/memory.db"
  markdown_path: "~/.mindbot/data/memory"
  short_term_retention_days: 7

# 上下文配置
context:
  max_tokens: 8000
  compression: "truncate"

# 会话记录
session_journal:
  enabled: true
  path: "~/.mindbot/data/journal"

# 多模态配置
multimodal:
  max_images: 10
  max_file_size_mb: 20.0
